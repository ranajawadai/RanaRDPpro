; xrdp.ini — RanaRDP-Pro overlay (XFCE session, no TLS cert hassle)
[Globals]
ini_version=1
fork=true
port=3389
enable_token_login=false
allow_admin_login=true
 ; disable TLS verification friction in container
security_layer=rdp
crypt_level=none
ssl_protocols=TLSv1.2, TLSv1.3

[Logging]
LogFile=/var/log/xrdp.log
LogLevel=INFO
EnableSyslog=false
SyslogLevel=INFO

[Channels]
rdpdr=true
rdpsnd=true
drdynvc=true
cliprdr=true
rail=true
dvcmpc=true
encomsp=true

[Xvnc]
name=Xvnc
lib=libvnc.so
username=ask
password=ask
ip=127.0.0.1
port=-1
xserverbpp=24
code=UTF-8
; XFCE via startwm.sh -> /etc/X11/Xsession -> .xsession
session=/etc/X11/Xsession

[Session]
; default session uses Xvnc
KillDisconnected=false
DisconnectedTimeLimit=0
MaxSessions=20
