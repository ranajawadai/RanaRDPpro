; xrdp.ini — RanaRDP-Pro (Kali XFCE, container-friendly)
[Globals]
ini_version=1
fork=false
port=3389
enable_token_login=false
allowed_users=anybody

[Logging]
LogFile=/var/log/xrdp.log
LogLevel=INFO
EnableSyslog=false
SyslogLevel=INFO

[Channels]
rdpdr=true
rdpsnd=true
drdynvc=true
cliprdr=true

[Xvnc]
name=Xvnc
lib=libvnc.so
username=ask
password=ask
ip=127.0.0.1
port=-1
xserverbpp=24
code=UTF-8
; Use startwm.sh which calls startxfce4
session=/etc/xrdp/startwm.sh

[Session]
KillDisconnected=false
DisconnectedTimeLimit=0
MaxSessions=20
